name: Deploy Vultr API Firewall
on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to deploy'
                required: true
                default: 'test'
                type: choice
                options:
                - prod
                - test
    push:
        branches:
        - main
        paths:
        - '.github/workflows/deploy-vultr-api-fwl-ci.yml'

jobs:
    deploy-firewall:
        uses: nexsware/modules/.github/workflows/deploy-vultr-firewall.yml@main
        secrets: inherit
        with:
            environment: "${{ inputs.environment}}"
            description: "API Firewall for Nexsware infrastructure"
            firewall_type: "web"
            enable_ssh: true
            allow_ssh_from: "10.0.0.128/26"
            state_key: "${{ inputs.environment}}-api-firewall"