name: Deploy vultr Safii API Instance
on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to deploy'
                required: true
                default: 'test'
                type: choice
                options:
                - prod
                - test
    push:
        branches:
        - main
        paths:
        - '.github/workflows/deploy-vultr-api-instance-ci.yml'
jobs:
    deploy-api:
        name: Deploy vultr Safii API Instance
        uses: nexsware/modules/.github/workflows/deploy-vultr-instance.yml@main
        secrets: inherit
        with:
            environment: "${{ inputs.environment}}"
            region: "jnb"
            plan: "vc2-1c-1gb"  # Adjust as needed
            os_id: 2284  # Ubuntu 24.04 x64 LTS
            label: "Safii-api-host"
            state_key: "${{ inputs.environment}}-safii-api-vps"
            firewall_group_id: "467a4c21-c792-41a3-b434-74ff6b81b5d3" # Reference to the bastion firewall group created separately
            vpc_ids: "6836516b-2681-4914-8f57-f9a1dc3e241e" # Reference to the VPC created separately
            ssh_key_ids: "caf0a6fb-b120-4648-b6e0-9018519e6b10" # Reference to the SSH key created separately
            private_ip: '10.0.0.1'
            instance_subnet: '10.0.0.0/26'