name: UTMStack SIEM Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - prod
          - test

  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/deploy-siem.ci.yml'
      - 'SIEM/**'

  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-siem.ci.yml'
      - 'SIEM/**'


jobs:
  install-siems:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 172.232.119.4 >> ~/.ssh/known_hosts

      - name: Cleanup existing installation
        run: |
          ssh -o StrictHostKeyChecking=no root@172.232.119.4 << 'EOF'
            docker rm -f $(docker ps -aq) 2>/dev/null || true
            docker volume prune -f 2>/dev/null || true
          EOF

      - name: Fix netplan configuration
        run: |
          ssh -o StrictHostKeyChecking=no root@172.232.119.4 \
            'printf "network:\n  version: 2\n  renderer: networkd\n  ethernets:\n    eth0:\n      dhcp4: true\n" > /etc/netplan/01-netcfg.yaml && chmod 600 /etc/netplan/*.yaml && netplan apply'

      - name: Install UTMStack
        run: |
          ssh -o StrictHostKeyChecking=no root@172.232.119.4 << 'EOF'
            wget -O /tmp/installer https://github.com/utmstack/UTMStack/releases/latest/download/installer
            chmod +x /tmp/installer
            /tmp/installer
          EOF

      - name: Display deployment information
        run: |
          echo "========================================="
          echo "UTMStack Deployment Complete!"
          echo "========================================="
          echo "IP Address: 172.232.119.4"
          echo ""
          echo "Access UTMStack UI at:"
          echo "  https://172.232.119.4"
          echo "========================================="
