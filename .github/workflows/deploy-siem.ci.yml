name: UTMStack SIEM Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - prod
          - test
          
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/deploy-siem.ci.yml'
      - 'SIEM/**'
  
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-siem.ci.yml'
      - 'SIEM/**'


jobs:
  install-siems:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ vars.SIEMS_IP_ADDRESS }} >> ~/.ssh/known_hosts

      - name: Install Docker
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.SIEMS_IP_ADDRESS }} << 'EOF'
            # Update system
            apt-get update

            # Install Docker
            apt-get install -y ca-certificates curl gnupg lsb-release
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg

            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
              $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

            # Enable and start Docker
            systemctl enable docker
            systemctl start docker

            # Verify installation
            docker --version
            docker compose version
          EOF

      - name: Copy Dockerfile to instance
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.SIEMS_IP_ADDRESS }} mkdir -p /opt/utmstack
          scp -o StrictHostKeyChecking=no SIEM/Dockerfile root@${{ vars.SIEMS_IP_ADDRESS }}:/opt/utmstack/

      - name: Build and Deploy UTMStack Container
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ vars.SIEMS_IP_ADDRESS }} << 'EOF'
            cd /opt/utmstack

            # Build the UTMStack image
            docker build -t nexsware-utmstack:latest .

            # Remove existing container if present
            docker rm -f utmstack 2>/dev/null || true

            # Run the UTMStack container
            docker run -d \
              --name utmstack \
              --restart unless-stopped \
              --privileged \
              -p 443:443 \
              -p 9200:9200 \
              -p 5044:5044 \
              -p 514:514/udp \
              -p 514:514/tcp \
              -v utmstack-data:/opt/utmstack/data \
              -v /var/run/docker.sock:/var/run/docker.sock \
              nexsware-utmstack:latest

            # Configure firewall to allow UTMStack ports
            ufw --force enable
            ufw allow 22/tcp          # SSH
            ufw allow 443/tcp         # HTTPS (UTMStack UI)
            ufw allow 9200/tcp        # Elasticsearch
            ufw allow 5044/tcp        # Logstash
            ufw allow 514/tcp         # Syslog TCP
            ufw allow 514/udp         # Syslog UDP
            ufw reload

            echo "UTMStack container deployed successfully"
          EOF

      - name: Display deployment information
        run: |
          echo "========================================="
          echo "UTMStack Deployment Complete!"
          echo "========================================="
          echo "IP Address: ${{ vars.SIEMS_IP_ADDRESS }}"
          echo ""
          echo "Access UTMStack UI at:"
          echo "  https://${{ vars.SIEMS_IP_ADDRESS }}"
          echo ""
          echo "Container: nexsware-utmstack:latest"
          echo "========================================="

      - name: Health check
        run: |
          echo "Waiting for UTMStack container to be ready..."
          sleep 60
          ssh -o StrictHostKeyChecking=no root@${{ vars.SIEMS_IP_ADDRESS }} << 'EOF'
            echo "Container status:"
            docker ps -a --filter name=utmstack
            echo ""
            echo "Container logs (last 20 lines):"
            docker logs --tail 20 utmstack
          EOF
