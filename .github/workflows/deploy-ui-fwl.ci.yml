name: Deploy UI Firewall

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to deploy'
                required: true
                type: choice
                options:
                - prod
                - test
    pull_request:
        branches:
        - '**'
        paths:
        - '.github/workflows/deploy-ui-fwl.ci.yml'
    push:
        branches:
        - main
        paths:
        - '.github/workflows/deploy-ui-fwl.ci.yml'
jobs:
    deploy-firewall:
        uses: nexsware/modules/.github/workflows/deploy-firewall.yml@main
        secrets: inherit
        with:
            firewall_label: "web-server-firewall"
            environment: "${{ inputs.environment || 'test' }}"