name: UTMStack SIEM Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - prod
          - test
      instance_type:
        description: 'Linode instance type'
        required: false
        type: choice
        default: 'g6-standard-4'
        options:
          - 'g6-standard-2'
          - 'g6-standard-4'
          - 'g6-standard-6'
          - 'g6-standard-8'
  pull_request:
    branches:
      - '**'
    paths:
      - '.github/workflows/siem.ci.yml'
      - 'SIEM/**'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/siem.ci.yml'
      - 'SIEM/**'

jobs:
  deploy-siems-instance:
    uses: nexsware/modules/.github/workflows/deploy-instance.yml@main
    secrets: inherit
    with:
      environment: ${{ inputs.environment || 'test' }}
      image: 'linode/ubuntu22.04'
      region: 'in-maa'
      instance_type: 'g6-standard-1'
      application_name: 'nexsware-siems'
      domains_containers: 'siems.nexsware.com'
      install_nginx: true
      vpc_id: 322358
      subnet_id: 356295
      stackscript_id: '1980834'

  install-siems:
    needs: deploy-siems-instance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Wait for instance to be ready
        run: sleep 30

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ needs.deploy-siems-instance.outputs.ip_address }} >> ~/.ssh/known_hosts

      - name: Install Docker
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ needs.deploy-siems-instance.outputs.ip_address }} << 'EOF'
            # Update system
            apt-get update

            # Install Docker
            apt-get install -y ca-certificates curl gnupg lsb-release
            install -m 0755 -d /etc/apt/keyrings
            curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
            chmod a+r /etc/apt/keyrings/docker.gpg

            echo \
              "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
              $(lsb_release -cs) stable" | tee /etc/apt/sources.list.d/docker.list > /dev/null

            apt-get update
            apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

            # Enable and start Docker
            systemctl enable docker
            systemctl start docker

            # Verify installation
            docker --version
            docker compose version
          EOF

      - name: Copy Dockerfile to instance
        run: |
          scp -o StrictHostKeyChecking=no SIEM/Dockerfile root@${{ needs.deploy-siems-instance.outputs.ip_address }}:/root/

      - name: Build and Deploy UTMStack Container
        run: |
          ssh -o StrictHostKeyChecking=no root@${{ needs.deploy-siems-instance.outputs.ip_address }} << 'EOF'
            # Create UTMStack directory
            mkdir -p /opt/utmstack
            cd /opt/utmstack

            # Copy Dockerfile
            cp /root/Dockerfile .

            # Build the UTMStack image
            docker build -t nexsware-utmstack:latest .

            # Run the UTMStack container
            docker run -d \
              --name utmstack \
              --restart unless-stopped \
              --privileged \
              -p 443:443 \
              -p 9200:9200 \
              -p 5044:5044 \
              -p 514:514/udp \
              -p 514:514/tcp \
              -v utmstack-data:/opt/utmstack/data \
              -v /var/run/docker.sock:/var/run/docker.sock \
              nexsware-utmstack:latest

            # Configure firewall to allow UTMStack ports
            ufw --force enable
            ufw allow 22/tcp          # SSH
            ufw allow 443/tcp         # HTTPS (UTMStack UI)
            ufw allow 9200/tcp        # Elasticsearch
            ufw allow 5044/tcp        # Logstash
            ufw allow 514/tcp         # Syslog TCP
            ufw allow 514/udp         # Syslog UDP
            ufw reload

            echo "UTMStack container deployed successfully"
          EOF

      - name: Display deployment information
        run: |
          echo "========================================="
          echo "UTMStack Deployment Complete!"
          echo "========================================="
          echo "Instance ID: ${{ needs.deploy-siems-instance.outputs.instance_id }}"
          echo "IP Address: ${{ needs.deploy-siems-instance.outputs.ip_address }}"
          echo ""
          echo "Access UTMStack UI at:"
          echo "  https://${{ needs.deploy-siems-instance.outputs.ip_address }}"
          echo ""
          echo "Container: nexsware-utmstack:latest"
          echo "========================================="

      - name: Health check
        run: |
          echo "Waiting for UTMStack container to be ready..."
          sleep 60
          ssh -o StrictHostKeyChecking=no root@${{ needs.deploy-siems-instance.outputs.ip_address }} << 'EOF'
            echo "Container status:"
            docker ps -a --filter name=utmstack
            echo ""
            echo "Container logs (last 20 lines):"
            docker logs --tail 20 utmstack
          EOF
