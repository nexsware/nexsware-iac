# In your app repository: .github/workflows/deploy.yml
name: Deploy Install Flyway

on:
    workflow_dispatch:
        inputs:
            environment:
                description: 'Environment to deploy'
                required: false
                type: choice
                options:
                    - test
                    - prod
    pull_request:
      branches: [ '**' ]
      paths:
        - database/sql/**
        - '.github/workflows/flyway.ci.yml'
    push:
        branches: [main]
        paths:
          - 'database/sql/**'
          - '.github/workflows/flyway.ci.yml'

jobs:
  run-migrations:
    uses: nexsware/modules/.github/workflows/run-flyway-migration.yml@main
    with:
      environment: ${{ inputs.environment || 'test' }}
      database_host: "10.0.0.2"  # Your VPC IP
      database_port: "5432"
      database_name: "nexsware-db"
      database_user: "postgres"
      migrations_path: "database/sql"  # Path in your repo
      flyway_command: "migrate"
      flyway_version: "11.20.0"
      ssh_tunnel_host: 172.235.28.178  # Public IP of database server
      ssh_tunnel_user: root      
    secrets:
      DATABASE_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }} 
